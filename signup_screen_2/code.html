<p class="text-on-surface-variant text-sm mt-1">Join the community of precision vehicle owners.</p>
</header>
<form class="space-y-5">
<div class="relative floating-label-input">

</div>

<input class="w-full h-14 px-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary text-on-surface transition-all duration-300 placeholder-transparent" id="password" placeholder=" " type="password"/>
<label class="absolute left-4 top-4 text-on-surface-variant font-medium" for="password">Password</label>
</div>
<button class="w-full h-14 bg-primary-gradient text-on-primary font-headline font-bold text-sm uppercase tracking-widest rounded-xl shadow-lg hover:opacity-95 active:scale-95 transition-all duration-200 mt-2" type="submit">
